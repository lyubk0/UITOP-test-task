services:
  - type: web
    name: todo-backend
    runtime: node
    rootDir: .
    buildCommand: pnpm install && pnpm exec prisma migrate deploy && pnpm exec prisma generate && pnpm build
    startCommand: node dist/main
    envVars:
      - key: DATABASE_URL
        value: file:/data/prod.db
      - key: FRONTEND_URL
        fromGroup: todo-env
      - key: PORT
        value: "3000"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
